<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Page</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px;
            text-align: center;
            max-width: 600px;
            animation: fadeIn 0.8s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0 auto 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
        }
        h1 { color: #333; margin-bottom: 10px; font-size: 2em; }
        .subtitle { color: #666; font-size: 1.2em; margin-bottom: 30px; }
        .links { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .link {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .link:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4); }
        .skills { margin-top: 30px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .skill { background: #f0f2f5; color: #555; padding: 6px 16px; border-radius: 15px; font-size: 0.9em; }
        .footer { margin-top: 30px; color: #999; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar">:wave:</div>
        <h1>Welcome to My World</h1>
        <p class="subtitle">Full Stack Developer | Open Source Enthusiast</p>
        <div class="skills">
            <span class="skill">Python</span>
            <span class="skill">JavaScript</span>
            <span class="skill">Node.js</span>
            <span class="skill">GitHub</span>
        </div>
        <div class="links">
            <a href="https://github.com/gongtongfeng" class="link" target="_blank">GitHub</a>
            <a href="#" class="link">Blog</a>
            <a href="#" class="link">Contact</a>
        </div>
        <p class="footer">Created by QClaw AI | 2026</p>
    </div>
</body>
</html>
